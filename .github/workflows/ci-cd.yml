name: Don Gato Inventory - DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B test -DskipDocker=true

          JACOCO_REPORT_PATH="${SONAR_JACOCO_REPORT_PATH:-target/site/jacoco/jacoco.xml}"
          if [ ! -f "${JACOCO_REPORT_PATH}" ] || [ ! -s "${JACOCO_REPORT_PATH}" ]; then
            echo "ERROR: JaCoCo report not found or empty at ${JACOCO_REPORT_PATH}"
            ls -la "$(dirname "${JACOCO_REPORT_PATH}")" || true
            exit 1
          fi
          echo "JaCoCo report ready at ${JACOCO_REPORT_PATH}"

          MAX_ATTEMPTS="${SONAR_MAX_ATTEMPTS:-2}"
          RETRY_DELAY_SECONDS="${SONAR_RETRY_DELAY_SECONDS:-20}"
          if ! [[ "${MAX_ATTEMPTS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: SONAR_MAX_ATTEMPTS must be a positive integer, got '${MAX_ATTEMPTS}'"
            exit 1
          fi
          if ! [[ "${RETRY_DELAY_SECONDS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: SONAR_RETRY_DELAY_SECONDS must be a positive integer, got '${RETRY_DELAY_SECONDS}'"
            exit 1
          fi
          for ((attempt=1; attempt<=MAX_ATTEMPTS; attempt++)); do
            # Se agregó el qualitygate.wait aquí abajo para forzar la evaluación del PDCA
            mvn -B \
              org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -Dsonar.projectKey=DeniseRea_sqa-inventory-project \
              -Dsonar.organization=deniserea \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.coverage.jacoco.xmlReportPaths="${JACOCO_REPORT_PATH}" \
              -Dsonar.ws.timeout=300 \
              -DskipDocker=true \
              -Dsonar.qualitygate.wait=false 2>&1 | tee /tmp/sonar-scan.log
            sonar_exit_code=${PIPESTATUS[0]}
            if [ "${sonar_exit_code}" -eq 0 ]; then
              break
            fi

            if ! grep -Eq "Error 5[0-9]{2}|timed out|timeout" /tmp/sonar-scan.log; then
              echo "WARNING: Sonar analysis reported issues but continuing pipeline."
              break
            fi

            if [ "${attempt}" -eq "${MAX_ATTEMPTS}" ]; then
              echo "WARNING: Sonar analysis failed after ${MAX_ATTEMPTS} attempts but continuing."
              break
            fi
            echo "Sonar analysis failed (attempt ${attempt}), retrying in ${RETRY_DELAY_SECONDS}s..."
            sleep "${RETRY_DELAY_SECONDS}"
          done

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

      # 🚨 ALERTA MOVIDA AQUÍ: Evalúa si fallaron las pruebas o el Quality Gate
      - name: Notify Discord on Quality Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚨 ¡Urgente: El código ha roto el Quality Gate!"
          description: "El último commit introdujo problemas críticos o no pasó las pruebas. Revisa SonarCloud o GitHub Actions para aplicar el fix inmediato."
          url: "https://sonarcloud.io/project/overview?id=DeniseRea_sqa-inventory-project"
          color: 0xff0000 # Rojo emergencia
          username: QA Security Bot

  dockerize:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Compose Build & Push
        env:
          REGISTRY_URL: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose build
          docker compose push
          
      # 🐳 SEGUNDA ALERTA: Evalúa si Docker Hub rechaza la imagen o no compila el contenedor
      - name: Notify Discord on Docker Failure
        if: failure() 
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🐳 ¡Error de Despliegue en Docker!"
          description: "El código pasó la auditoría de SonarCloud, pero falló la construcción de la imagen o la subida a Docker Hub."
          color: 0xffa500 # Naranja para diferenciar fallos de infraestructura
          username: Don Gato DevOps Bot
