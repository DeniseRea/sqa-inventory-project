name: Don Gato Inventory - DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B test -DskipDocker=true

          JACOCO_REPORT_PATH="target/site/jacoco/jacoco.xml"
          if [ ! -s "${JACOCO_REPORT_PATH}" ]; then
            echo "ERROR: JaCoCo report not found or empty at ${JACOCO_REPORT_PATH}"
            ls -la target/site || true
            exit 1
          fi
          echo "JaCoCo report ready at ${JACOCO_REPORT_PATH}"

          for attempt in 1 2; do
            mvn -B \
              org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -Dsonar.projectKey=DeniseRea_sqa-inventory-project \
              -Dsonar.organization=deniserea \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.coverage.jacoco.xmlReportPaths=${JACOCO_REPORT_PATH} \
              -Dsonar.ws.timeout=300 \
              -DskipDocker=true && break

            if [ "${attempt}" -eq 2 ]; then
              echo "ERROR: Sonar analysis failed after retry"
              exit 1
            fi
            echo "Sonar analysis failed (attempt ${attempt}), retrying in 20s..."
            sleep 20
          done

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/
