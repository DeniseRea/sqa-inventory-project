name: Don Gato Inventory - DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_quality_failure:
        description: "Forzar fallo del pipeline despues de Sonar (simulacion segura)"
        required: false
        default: "false"

jobs:
  build-and-test:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          FORCE_QUALITY_FAILURE: ${{ github.event.inputs.force_quality_failure || 'false' }}
        run: |
          mvn -B test -DskipDocker=true

          JACOCO_REPORT_PATH="${SONAR_JACOCO_REPORT_PATH:-target/site/jacoco/jacoco.xml}"
          if [ ! -f "${JACOCO_REPORT_PATH}" ] || [ ! -s "${JACOCO_REPORT_PATH}" ]; then
            echo "ERROR: JaCoCo report not found or empty at ${JACOCO_REPORT_PATH}"
            ls -la "$(dirname "${JACOCO_REPORT_PATH}")" || true
            exit 1
          fi
          echo "JaCoCo report ready at ${JACOCO_REPORT_PATH}"

          MAX_ATTEMPTS="${SONAR_MAX_ATTEMPTS:-2}"
          RETRY_DELAY_SECONDS="${SONAR_RETRY_DELAY_SECONDS:-20}"
          if ! [[ "${MAX_ATTEMPTS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: SONAR_MAX_ATTEMPTS must be a positive integer, got '${MAX_ATTEMPTS}'"
            exit 1
          fi
          if ! [[ "${RETRY_DELAY_SECONDS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: SONAR_RETRY_DELAY_SECONDS must be a positive integer, got '${RETRY_DELAY_SECONDS}'"
            exit 1
          fi
          for ((attempt=1; attempt<=MAX_ATTEMPTS; attempt++)); do
            # Se agregó el qualitygate.wait aquí abajo para forzar la evaluación del PDCA
            mvn -B \
              org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -Dsonar.projectKey=DeniseRea_sqa-inventory-project \
              -Dsonar.organization=deniserea \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.coverage.jacoco.xmlReportPaths="${JACOCO_REPORT_PATH}" \
              -Dsonar.ws.timeout=300 \
              -DskipDocker=true \
              -Dsonar.qualitygate.wait=true 2>&1 | tee /tmp/sonar-scan.log
            sonar_exit_code=${PIPESTATUS[0]}
            if [ "${sonar_exit_code}" -eq 0 ]; then
              break
            fi

            if ! grep -Eq "Error 5[0-9]{2}|timed out|timeout" /tmp/sonar-scan.log; then
              echo "ERROR: Sonar analysis failed with a non-transient error; skipping retry."
              exit "${sonar_exit_code}"
            fi

            if [ "${attempt}" -eq "${MAX_ATTEMPTS}" ]; then
              echo "ERROR: Sonar analysis failed after ${MAX_ATTEMPTS} attempts"
              exit "${sonar_exit_code}"
            fi
            echo "Sonar analysis failed (attempt ${attempt}), retrying in ${RETRY_DELAY_SECONDS}s..."
            sleep "${RETRY_DELAY_SECONDS}"
          done

          if [ "${FORCE_QUALITY_FAILURE}" = "true" ]; then
            echo "Forcing CI failure for webhook/PDCA simulation."
            exit 1
          fi

      - name: Calculate Quality Score for Discord
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          SONAR_METRICS_JSON="$(curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/measures/component?component=DeniseRea_sqa-inventory-project&metricKeys=bugs,code_smells,vulnerabilities" || true)"
          export SONAR_METRICS_JSON
          python - <<'PY' >> "$GITHUB_ENV"
          import glob
          import json
          import os
          import xml.etree.ElementTree as ET

          coverage = 0.0
          jacoco_path = "target/site/jacoco/jacoco.xml"
          if os.path.exists(jacoco_path) and os.path.getsize(jacoco_path) > 0:
              root = ET.parse(jacoco_path).getroot()
              line_counter = next((c for c in root.findall("counter") if c.get("type") == "LINE"), None)
              if line_counter is not None:
                  missed = int(line_counter.get("missed", "0"))
                  covered = int(line_counter.get("covered", "0"))
                  total = missed + covered
                  coverage = (covered / total * 100.0) if total else 0.0

          test_failures = 0
          for report in glob.glob("target/surefire-reports/*.xml"):
              try:
                  root = ET.parse(report).getroot()
                  test_failures += int(root.get("failures", "0")) + int(root.get("errors", "0"))
              except ET.ParseError:
                  test_failures += 1

          metrics = {"bugs": 0, "code_smells": 0, "vulnerabilities": 0}
          try:
              data = json.loads(os.getenv("SONAR_METRICS_JSON", "{}"))
              for item in data.get("component", {}).get("measures", []):
                  metrics[item["metric"]] = int(float(item.get("value", "0")))
          except (TypeError, ValueError, json.JSONDecodeError):
              pass

          bugs = max(metrics["bugs"], 1 if test_failures else 0)
          smells = metrics["code_smells"]
          vulnerabilities = metrics["vulnerabilities"]

          testability = min(coverage, 100.0)
          correctness = max(100.0 - (bugs * 10.0), 0.0)
          maintainability = max(100.0 - (smells * 2.0), 0.0)
          integrity = 100.0 if vulnerabilities == 0 else 0.0
          score = (testability * 0.30) + (correctness * 0.30) + (maintainability * 0.20) + (integrity * 0.20)

          if score >= 90:
              grade = "A"
          elif score >= 80:
              grade = "B"
          elif score >= 70:
              grade = "C"
          elif score >= 60:
              grade = "D"
          else:
              grade = "F"

          print(f"QUALITY_SCORE={score:.2f}")
          print(f"QUALITY_GRADE={grade}")
          print(f"QUALITY_COVERAGE={coverage:.2f}")
          print(f"QUALITY_BUGS={bugs}")
          print(f"QUALITY_SMELLS={smells}")
          print(f"QUALITY_VULNS={vulnerabilities}")
          PY

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

      - name: Notify Discord on Quality Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SONAR_URL: https://sonarcloud.io/project/overview?id=DeniseRea_sqa-inventory-project
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "${DISCORD_WEBHOOK}" ]; then
            echo "DISCORD_WEBHOOK is not configured; skipping quality failure notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import urllib.request

          score = os.getenv("QUALITY_SCORE", "N/A")
          grade = os.getenv("QUALITY_GRADE", "N/A")
          coverage = os.getenv("QUALITY_COVERAGE", "N/A")
          bugs = os.getenv("QUALITY_BUGS", "N/A")
          smells = os.getenv("QUALITY_SMELLS", "N/A")
          vulns = os.getenv("QUALITY_VULNS", "N/A")
          short_sha = os.getenv("COMMIT_SHA", "")[:7]

          payload = {
              "username": "QA Security Bot",
              "embeds": [{
                  "title": "Quality Gate FAILED - iniciar nuevo ciclo PDCA",
                  "description": (
                      "El pipeline fallo en pruebas, Quality Gate o seguridad. "
                      "Revisar el run, crear/corregir issue y volver a PLAN."
                  ),
                  "url": os.getenv("RUN_URL"),
                  "color": 16711680,
                  "fields": [
                      {"name": "QualityScore", "value": f"{score}/100 ({grade})", "inline": True},
                      {"name": "Coverage", "value": f"{coverage}%", "inline": True},
                      {"name": "Seguridad", "value": f"{vulns} vulnerabilidades", "inline": True},
                      {"name": "Bugs / Smells", "value": f"{bugs} / {smells}", "inline": True},
                      {"name": "Evento", "value": os.getenv("EVENT_NAME", "unknown"), "inline": True},
                      {"name": "Branch/Commit", "value": f"{os.getenv('REF_NAME', 'unknown')} @ {short_sha}", "inline": True},
                      {"name": "SonarCloud", "value": os.getenv("SONAR_URL"), "inline": False},
                  ],
              }]
          }

          data = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK"],
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=15).read()
          PY

      - name: Notify Discord Pull Request Status
        if: always() && github.event_name == 'pull_request'
        env:
          DISCORD_PR_WEBHOOK: ${{ secrets.DISCORD_PR_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TARGET_DISCORD_WEBHOOK="${DISCORD_PR_WEBHOOK:-${DISCORD_WEBHOOK}}"
          if [ -z "${TARGET_DISCORD_WEBHOOK}" ]; then
            echo "No Discord webhook configured; skipping PR notification."
            exit 0
          fi
          export TARGET_DISCORD_WEBHOOK

          python - <<'PY'
          import json
          import os
          import urllib.request

          status = os.getenv("JOB_STATUS", "unknown")
          passed = status == "success"
          payload = {
              "username": "Don Gato PR Bot",
              "embeds": [{
                  "title": f"PR #{os.getenv('PR_NUMBER')} - {'PASSED' if passed else 'FAILED'}",
                  "description": os.getenv("PR_TITLE", "Pull request"),
                  "url": os.getenv("PR_URL"),
                  "color": 5763719 if passed else 15548997,
                  "fields": [
                      {"name": "Autor", "value": os.getenv("PR_AUTHOR", "unknown"), "inline": True},
                      {"name": "Estado CI", "value": status, "inline": True},
                      {"name": "QualityScore", "value": f"{os.getenv('QUALITY_SCORE', 'N/A')}/100 ({os.getenv('QUALITY_GRADE', 'N/A')})", "inline": True},
                      {"name": "Run", "value": os.getenv("RUN_URL"), "inline": False},
                  ],
              }]
          }

          data = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              os.environ["TARGET_DISCORD_WEBHOOK"],
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=15).read()
          PY

  dockerize:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Compose Build & Push
        env:
          REGISTRY_URL: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose build
          docker compose push
          
      # 🐳 SEGUNDA ALERTA: Evalúa si Docker Hub rechaza la imagen o no compila el contenedor
      - name: Notify Discord on Docker Failure
        if: failure() 
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🐳 ¡Error de Despliegue en Docker!"
          description: "El código pasó la auditoría de SonarCloud, pero falló la construcción de la imagen o la subida a Docker Hub."
          color: 0xffa500 # Naranja para diferenciar fallos de infraestructura
          username: Don Gato DevOps Bot
